<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamCompare — Stop Overpaying for Streaming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,800;1,9..144,500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1a2e;--body:#374151;--muted:#888;--light-muted:#aaa;
  --teal:#0d9488;--teal-glow:#14b8a6;--teal-light:#ccfbf1;--teal-bg:#f0faf9;
  --green:#059669;--green-light:#ecfdf5;--green-border:#a7f3d0;
  --red:#dc2626;--red-border:#fecaca;
  --orange-light:#fff7ed;--orange-border:#fed7aa;--orange-text:#9a3412;
  --card:#fff;--border:#e8e8f0;--border-light:#f0f0f5;--pill-border:#e2e2ea;
  --tab-bg:#ededf3;--alt-row:#fafcff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;color:var(--body);background:linear-gradient(180deg,#fffbf5 0%,#f0faf9 100%);min-height:100vh;-webkit-font-smoothing:antialiased}
input::placeholder{color:#b0b0c0}
.wrap{max-width:1100px;margin:0 auto}
.header{padding:22px 20px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px}
.logo{font-family:'Fraunces',serif;font-weight:800;font-size:24px;color:var(--ink);letter-spacing:-1px}
.logo span{color:var(--teal)}
.badge{font-size:11px;font-weight:600;color:var(--teal);background:var(--teal-light);padding:3px 10px;border-radius:100px;white-space:nowrap}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:18px}
.content{padding:18px 20px 50px}
.tabs{display:flex;gap:3px;background:var(--tab-bg);border-radius:12px;padding:3px;width:fit-content;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:8px 16px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.tab-btn.active{background:#fff;color:var(--ink);box-shadow:0 1px 6px rgba(0,0,0,.06)}
.panel{display:none;animation:fadeIn .3s ease-out}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.pill{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:100px;border:2px solid var(--pill-border);background:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#666;white-space:nowrap;transition:all .2s}
.pill .svc-icon{width:22px;height:22px;border-radius:6px;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;letter-spacing:-.5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.05)}
.svc-badge{padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.svc-badge .dot{width:6px;height:6px;border-radius:50%}
.svc-badge.included{background:var(--green-light);color:#065f46;border:1px solid var(--green-border)}
.svc-badge.rental{background:var(--orange-light);color:var(--orange-text);border:1px solid var(--orange-border)}
.wl-btn{margin-left:auto;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid var(--pill-border);background:#fff;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.wl-btn.in{border-color:var(--green-border);background:var(--green-light);color:#065f46}
.table-wrap{overflow-x:auto;border-radius:16px;border:1px solid var(--border);-webkit-overflow-scrolling:touch}
.table-wrap table{width:100%;border-collapse:collapse;font-family:'DM Sans',sans-serif}
.table-wrap th{padding:14px 16px;text-align:center;background:#fafafe;border-bottom:2px solid var(--border)}
.table-wrap th:first-child{text-align:left;position:sticky;left:0;z-index:2;min-width:165px;font-size:11px;color:#999;font-weight:700;letter-spacing:1px}
.table-wrap td{padding:11px 16px;border-bottom:1px solid var(--border-light);text-align:center;font-size:12px;color:#555;max-width:190px}
.table-wrap td:first-child{text-align:left;position:sticky;left:0;z-index:1;font-weight:600;white-space:nowrap;font-size:12px}
.table-wrap tr:nth-child(even) td{background:var(--alt-row)}
.table-wrap tr:nth-child(odd) td{background:#fff}
.loader{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-wrap{text-align:center;padding:50px 20px}
.loader-wrap p{color:var(--muted);margin-top:16px;font-size:14px}
.empty{text-align:center;padding:50px 20px;color:var(--light-muted);font-size:14px}
.empty .icon{font-size:36px;margin-bottom:10px}
.retry-btn{padding:8px 20px;border-radius:10px;border:1px solid var(--pill-border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:#555;margin-top:12px}
.tip{margin-top:14px;padding:13px 16px;border-radius:12px;background:var(--teal-bg);border:1px solid var(--teal-light);display:flex;align-items:flex-start;gap:10px;font-size:12.5px;color:#555;line-height:1.6}
.sub-tabs{display:flex;gap:4px;margin-bottom:14px}
.sub-tab{padding:7px 14px;border-radius:10px;border:none;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.sub-tab.active{background:var(--teal);color:#fff}
.sub-tab:not(.active){background:#f0f0f5;color:var(--muted)}
.lc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:#fff;border:1px solid var(--border);margin-bottom:6px}
.lc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lc-title{flex:1;font-size:13px;font-weight:600;color:var(--ink)}
.lc-type{font-size:11px;color:#999;margin-right:4px}
.lc-date{font-size:11px;font-weight:500;color:#777;padding:3px 9px;background:#f5f5fa;border-radius:100px}
.opt-card{border-radius:16px;border:1px solid var(--teal-light);background:#f0fdfa;padding:18px}
.opt-title{font-family:'Fraunces',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px}
.opt-sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.opt-step{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;background:#fff;border:1px solid var(--border);margin-bottom:8px}
.opt-num{width:28px;height:28px;border-radius:50%;background:var(--teal-light);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.opt-stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.opt-stat{flex:1;min-width:120px;padding:10px 14px;border-radius:10px;text-align:center}
.opt-stat-label{font-size:10.5px;color:var(--muted);margin-bottom:2px}
.opt-stat-val{font-size:17px;font-weight:700}
.search-bar{display:flex;gap:10px;margin-bottom:20px}
.search-bar input{flex:1;padding:12px 16px;border-radius:12px;border:2px solid var(--pill-border);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;background:#fff}
.search-bar input:focus{border-color:var(--teal)}
.search-btn{padding:12px 22px;border-radius:12px;border:none;background:var(--teal);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .2s}
.search-btn:disabled{opacity:.5;cursor:wait}
.wl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.wl-count{font-size:14px;color:var(--muted)}
.wl-actions{display:flex;gap:8px}
.optimize-btn{padding:8px 16px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.optimize-btn:disabled{opacity:.6;cursor:wait}
.clear-btn{padding:8px 12px;border-radius:10px;border:1px solid var(--red-border);background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:var(--red);font-family:'DM Sans',sans-serif}
.poster{border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0}
@media(max-width:640px){
  .header-top{flex-direction:column;align-items:flex-start}
  .search-bar{flex-direction:column}
  .search-btn{width:100%}
  .wl-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-top">
      <div class="logo">Stream<span>Compare</span></div>
      <span class="badge">Live Data · Powered by AI</span>
    </div>
    <p class="subtitle">Compare streaming services, find where to watch anything, and stop overpaying.</p>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="content">
    <div id="panel-compare" class="panel active"></div>
    <div id="panel-search" class="panel"></div>
    <div id="panel-whatsnew" class="panel"></div>
    <div id="panel-watchlist" class="panel"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const SERVICES=[
  {id:"netflix",name:"Netflix",color:"#E50914",icon:"N",accent:"#FEE2E2"},
  {id:"disney",name:"Disney+",color:"#0063E5",icon:"D+",accent:"#DBEAFE"},
  {id:"hulu",name:"Hulu",color:"#1CE783",icon:"H",accent:"#D1FAE5"},
  {id:"max",name:"Max",color:"#741DFF",icon:"M",accent:"#EDE9FE"},
  {id:"prime",name:"Prime Video",color:"#00A8E1",icon:"P",accent:"#CFFAFE"},
  {id:"apple",name:"Apple TV+",color:"#555555",icon:"A",accent:"#F3F4F6"},
  {id:"paramount",name:"Paramount+",color:"#0064FF",icon:"P+",accent:"#DBEAFE"},
  {id:"peacock",name:"Peacock",color:"#000000",icon:"Pc",accent:"#FEF9C3"},
];
const CATS=[
  {key:"cheapest",label:"Cheapest Plan",icon:"💰"},
  {key:"premium",label:"Premium Plan",icon:"💎"},
  {key:"adSupported",label:"Ad-Free Available?",icon:"📺"},
  {key:"simultaneousStreams",label:"Simultaneous Streams",icon:"👥"},
  {key:"downloadable",label:"Offline Downloads?",icon:"📱"},
  {key:"resolution",label:"Max Resolution",icon:"🖥️"},
  {key:"liveTV",label:"Live TV Included?",icon:"📡"},
  {key:"freeTrialAvailable",label:"Free Trial?",icon:"🎁"},
  {key:"standoutContent",label:"Standout Content",icon:"⭐"},
  {key:"bestFor",label:"Best For",icon:"🎯"},
];
const svc=n=>SERVICES.find(s=>n&&s.name.toLowerCase().replace("+","").includes(n.toLowerCase().replace("+","").trim().split(" ")[0]));
const svcIcon=(s,sz=22)=>`<span class="svc-icon" style="width:${sz}px;height:${sz}px;border-radius:${sz*.28}px;background:${s.color};font-size:${sz*.42}px">${s.icon}</span>`;

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let activeTab="compare",watchlist=[],compareSelected=[],compareCache={},lifecycleCache={};
let compareData=null,compareLoading=false,compareError=false;
let searchResults=null,searchLoading=false,searchError=false,searchSearched=false;
let lcSelectedSvc=null,lcData=null,lcLoading=false,lcError=false,lcTab="comingSoon";
let optData=null,optLoading=false,optError=false;

// ═══════════════════════════════════════════
// AI LAYER — calls /api/chat (Vercel serverless function)
// ═══════════════════════════════════════════
async function aiQuery(prompt){
  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:4096,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:prompt}],
      }),
    });
    if(!res.ok){console.error("HTTP error:",res.status);return null;}
    const data=await res.json();
    if(data.error){console.error("API error:",data.error);return null;}
    if(!data.content||!Array.isArray(data.content)){console.error("Unexpected response:",data);return null;}
    // Extract text from all text blocks
    const texts=data.content.filter(b=>b.type==="text").map(b=>b.text).filter(Boolean);
    console.log("AI response texts:",texts);
    return texts.join("\n")||null;
  }catch(e){console.error("Fetch error:",e);return null;}
}

function parseJSON(raw){
  if(!raw){console.error("parseJSON: raw is null/empty");return null;}
  try{
    const c=raw.replace(/```json\s*/g,"").replace(/```/g,"").trim();
    const s1=c.indexOf("{"),s2=c.indexOf("[");
    const start=Math.min(s1>=0?s1:Infinity,s2>=0?s2:Infinity);
    const end=Math.max(c.lastIndexOf("}"),c.lastIndexOf("]"));
    if(start===Infinity||end===-1){console.error("parseJSON: no JSON found in:",c.substring(0,200));return null;}
    const jsonStr=c.substring(start,end+1);
    const parsed=JSON.parse(jsonStr);
    console.log("parseJSON success:",typeof parsed);
    return parsed;
  }catch(e){console.error("parseJSON failed:",e.message,"raw:",raw.substring(0,300));return null;}
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function renderTabs(){
  const tabs=[
    {key:"compare",label:"Compare",icon:"⚡"},
    {key:"search",label:"Find a Title",icon:"🔍"},
    {key:"whatsnew",label:"What's New",icon:"🆕"},
    {key:"watchlist",label:`Watchlist${watchlist.length?` (${watchlist.length})`:""}`,icon:"📋"},
  ];
  document.getElementById("tabs").innerHTML=tabs.map(t=>
    `<button class="tab-btn${activeTab===t.key?" active":""}" onclick="switchTab('${t.key}')">${t.icon} ${t.label}</button>`
  ).join("");
}

function switchTab(key){
  activeTab=key;renderTabs();
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  const panel=document.getElementById("panel-"+key);
  panel.classList.add("active");
  panel.style.animation="none";panel.offsetHeight;panel.style.animation="";
  if(key==="compare")renderCompare();
  else if(key==="search")renderSearch();
  else if(key==="whatsnew")renderWhatsNew();
  else if(key==="watchlist")renderWatchlist();
}

// ═══════════════════════════════════════════
// COMPARE
// ═══════════════════════════════════════════
function renderCompare(){
  const el=document.getElementById("panel-compare");
  let h=`<p style="font-size:14px;color:var(--muted);margin-bottom:12px">Pick up to 4 services to compare:</p><div class="pill-row">`;
  SERVICES.forEach(s=>{
    const sel=compareSelected.includes(s.id);
    h+=`<button class="pill" style="${sel?`border-color:${s.color};background:${s.accent};color:${s.color}`:""}" onclick="toggleCompare('${s.id}')">${svcIcon(s)} ${s.name}</button>`;
  });
  h+=`</div>`;
  if(compareSelected.length>=4)h+=`<p style="font-size:12px;color:#e67e22;margin:-8px 0 16px">Max 4 at a time. Deselect one to swap.</p>`;
  if(compareSelected.length<2){
    h+=`<div class="empty"><div class="icon">👆</div>Pick at least 2 services to compare them side-by-side</div>`;
  }else if(compareLoading){
    h+=`<div class="loader-wrap"><div class="loader"></div><p>Fetching the latest pricing & features...</p></div>`;
  }else if(compareError){
    h+=`<div class="empty"><div class="icon">😕</div>Something went wrong.<br><button class="retry-btn" onclick="fetchCompareData()">Try Again</button></div>`;
  }else if(compareData){
    const svcs=compareSelected.map(id=>SERVICES.find(s=>s.id===id));
    h+=`<div class="table-wrap"><table style="min-width:${svcs.length*170+190}px"><thead><tr><th>FEATURE</th>`;
    svcs.forEach(s=>{h+=`<th><span style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:${s.color}">${svcIcon(s,24)} ${s.name}</span></th>`;});
    h+=`</tr></thead><tbody>`;
    CATS.forEach(cat=>{
      h+=`<tr><td><span style="margin-right:6px">${cat.icon}</span>${cat.label}</td>`;
      svcs.forEach(s=>{
        const val=(compareData[s.name]||{})[cat.key]||"—";
        const isP=cat.key==="cheapest"||cat.key==="premium";
        let c;
        if(isP)c=`<span style="font-weight:700;color:var(--ink);font-size:14px">${val}</span>`;
        else if(val==="Yes")c=`<span style="color:var(--green);font-weight:600">✓ Yes</span>`;
        else if(val==="No")c=`<span style="color:var(--red);font-weight:500">✗ No</span>`;
        else c=val;
        h+=`<td>${c}</td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div>`;
    h+=`<div class="tip"><span style="font-size:16px;line-height:1.5">💡</span><p style="margin:0"><strong>Pro tip:</strong> You don't have to keep all these running at once. Subscribe to one, binge what you want, cancel, move to the next.</p></div>`;
  }
  el.innerHTML=h;
}

function toggleCompare(id){
  if(compareSelected.includes(id))compareSelected=compareSelected.filter(x=>x!==id);
  else if(compareSelected.length<4)compareSelected.push(id);
  if(compareSelected.length>=2)fetchCompareData();
  else{compareData=null;compareError=false;}
  renderCompare();
}

async function fetchCompareData(){
  const key=[...compareSelected].sort().join(",");
  if(compareCache[key]){compareData=compareCache[key];compareError=false;renderCompare();return;}
  compareLoading=true;compareError=false;compareData=null;renderCompare();
  const names=compareSelected.map(id=>SERVICES.find(s=>s.id===id)?.name).filter(Boolean);
  const prompt=`I need current comparison data for these US streaming services: ${names.join(", ")}.
Return ONLY a JSON object (no markdown, no backticks, no preamble):
{"${names[0]}":{"cheapest":"$X.XX/mo","premium":"$X.XX/mo","adSupported":"Yes" or "No","simultaneousStreams":"X","downloadable":"Yes" or "No","resolution":"4K UHD" or "1080p HD","liveTV":"Yes" or "No" or "Add-on","freeTrialAvailable":"Yes" or "No","standoutContent":"2-3 top shows","bestFor":"Short phrase"}}
Include ALL: ${names.join(", ")}. Current US pricing.`;
  const data=parseJSON(await aiQuery(prompt));
  compareLoading=false;
  if(data){compareCache[key]=data;compareData=data;}else compareError=true;
  renderCompare();
}

// ═══════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════
function renderSearch(){
  const el=document.getElementById("panel-search");
  const q=document.getElementById("search-input")?.value||"";
  let h=`<div class="search-bar"><input id="search-input" value="${q.replace(/"/g,'&quot;')}" placeholder='Try "The Office", "Batman", or "Harry Potter"' onkeydown="if(event.key==='Enter')doSearch()"><button class="search-btn" onclick="doSearch()" ${searchLoading?"disabled":""}>${searchLoading?"Searching...":"Search"}</button></div>`;
  if(searchLoading){
    h+=`<div class="loader-wrap"><div class="loader"></div><p>Searching across all platforms...</p></div>`;
  }else if(searchError){
    h+=`<div class="empty"><div class="icon">😕</div>Search didn't go through.<br><button class="retry-btn" onclick="doSearch()">Try Again</button></div>`;
  }else if(searchResults&&searchResults.length>0){
    searchResults.forEach((r,i)=>{
      const primary=svc(r.availableOn?.[0]?.service);
      const inWL=watchlist.some(w=>w.title===r.title);
      h+=`<div class="card" style="display:flex;gap:12px;align-items:flex-start;margin-bottom:10px">
        <div class="poster" style="width:46px;height:64px;background:linear-gradient(135deg,${primary?.color||"#666"},#1a1a2e);font-size:18px">${r.title?.[0]||"?"}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:2px">
            <h4 style="font-size:14.5px;font-weight:700;color:var(--ink)">${r.title}</h4>
            <span style="font-size:11px;color:#999">${r.year} · ${r.type} · ${r.rating}</span>
          </div>
          <p style="font-size:12px;color:#777;margin:2px 0 8px;line-height:1.5">${r.brief}</p>
          <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">`;
      r.availableOn?.forEach(a=>{
        const sv=svc(a.service);
        h+=`<span class="svc-badge ${a.included?"included":"rental"}">${sv?`<span class="dot" style="background:${sv.color}"></span>`:""}${a.service}${!a.included&&a.note?` · ${a.note}`:""}</span>`;
      });
      h+=`<button class="wl-btn${inWL?" in":""}" onclick="toggleWatchlist(${i})">${inWL?"✓ In Watchlist":"+ Watchlist"}</button>`;
      h+=`</div></div></div>`;
    });
  }else if(searchSearched){
    h+=`<div class="empty"><div class="icon">🤷</div>No results found. Try a different title?</div>`;
  }else{
    h+=`<div class="empty"><div class="icon">🎬</div>Search for any movie, show, character, or franchise</div>`;
  }
  el.innerHTML=h;
}

async function doSearch(){
  const input=document.getElementById("search-input");
  const q=input?.value?.trim();if(!q)return;
  searchLoading=true;searchError=false;searchSearched=true;searchResults=null;
  renderSearch();document.getElementById("search-input").value=q;
  const prompt=`Search for "${q}" and tell me which US streaming services currently have it.
Return ONLY a JSON array (no markdown, no backticks, no preamble):
[{"title":"Full Title","year":"2023","type":"Movie" or "TV Show","rating":"PG-13","availableOn":[{"service":"Netflix","included":true,"note":"Included with subscription"},{"service":"Prime Video","included":false,"note":"Rent $3.99"}],"brief":"One sentence description"}]
Up to 5 results.`;
  const data=parseJSON(await aiQuery(prompt));
  searchLoading=false;
  if(data)searchResults=data;else searchError=true;
  renderSearch();document.getElementById("search-input").value=q;
}

function toggleWatchlist(idx){
  const item=searchResults[idx];if(!item)return;
  const exists=watchlist.findIndex(w=>w.title===item.title);
  if(exists>=0)watchlist.splice(exists,1);else watchlist.push(item);
  renderSearch();renderTabs();
}

// ═══════════════════════════════════════════
// WHAT'S NEW
// ═══════════════════════════════════════════
function renderWhatsNew(){
  const el=document.getElementById("panel-whatsnew");
  let h=`<div class="pill-row">`;
  SERVICES.forEach(s=>{
    const sel=lcSelectedSvc?.id===s.id;
    h+=`<button class="pill" style="${sel?`border-color:${s.color};background:${s.accent};color:${s.color}`:""}" onclick="selectLC('${s.id}')">${svcIcon(s,20)} ${s.name}</button>`;
  });
  h+=`</div>`;
  if(!lcSelectedSvc){
    h+=`<div class="empty"><div class="icon">📺</div>Pick a streaming service to see what's new, coming soon, and leaving soon</div>`;
  }else if(lcLoading){
    h+=`<div class="loader-wrap"><div class="loader"></div><p>Checking ${lcSelectedSvc.name}...</p></div>`;
  }else if(lcError){
    h+=`<div class="empty"><div class="icon">😕</div>Something went wrong.<br><button class="retry-btn" onclick="retryLC()">Try Again</button></div>`;
  }else if(lcData){
    const tabs=[{key:"recentlyAdded",label:"Just Added",dot:"#8b5cf6"},{key:"comingSoon",label:"Coming Soon",dot:"#0d9488"},{key:"leavingSoon",label:"Leaving Soon",dot:"#ef4444"}];
    h+=`<div class="sub-tabs">`;
    tabs.forEach(t=>{h+=`<button class="sub-tab${lcTab===t.key?" active":""}" onclick="lcTab='${t.key}';renderWhatsNew()">${t.label}</button>`;});
    h+=`</div>`;
    const items=lcData[lcTab]||[];
    const dotColor=tabs.find(t=>t.key===lcTab)?.dot||"#999";
    if(items.length){
      items.forEach(item=>{
        h+=`<div class="lc-row"><span class="lc-dot" style="background:${dotColor}"></span><span class="lc-title">${item.title}</span><span class="lc-type">${item.type}</span><span class="lc-date">${item.date}</span></div>`;
      });
    }else{h+=`<p style="text-align:center;color:#bbb;font-size:13px;padding:20px">Nothing to show here right now.</p>`;}
  }
  el.innerHTML=h;
}

async function selectLC(id){
  lcSelectedSvc=SERVICES.find(s=>s.id===id);
  if(lifecycleCache[id]){lcData=lifecycleCache[id];lcError=false;renderWhatsNew();return;}
  lcLoading=true;lcError=false;lcData=null;renderWhatsNew();
  const prompt=`What titles were recently added, coming soon, and leaving soon on ${lcSelectedSvc.name} in the US?
Return ONLY JSON (no markdown, no backticks):
{"recentlyAdded":[{"title":"Name","date":"Mar 2026","type":"Movie" or "Series"}],"comingSoon":[{"title":"Name","date":"Apr 2026","type":"Movie" or "Series"}],"leavingSoon":[{"title":"Name","date":"Mar 31","type":"Movie" or "Series"}]}
3-5 items per category.`;
  const data=parseJSON(await aiQuery(prompt));
  lcLoading=false;
  if(data){lifecycleCache[id]=data;lcData=data;}else lcError=true;
  renderWhatsNew();
}

function retryLC(){if(lcSelectedSvc){delete lifecycleCache[lcSelectedSvc.id];selectLC(lcSelectedSvc.id);}}

// ═══════════════════════════════════════════
// WATCHLIST
// ═══════════════════════════════════════════
function renderWatchlist(){
  const el=document.getElementById("panel-watchlist");
  if(watchlist.length===0){
    el.innerHTML=`<div class="empty"><div class="icon">📋</div>Your watchlist is empty. Head to <strong>Find a Title</strong> to search and add shows.</div>`;return;
  }
  let h=`<div class="wl-header"><span class="wl-count">${watchlist.length} title${watchlist.length!==1?"s":""} in your watchlist</span><div class="wl-actions">${watchlist.length>=2?`<button class="optimize-btn" onclick="runOptimizer()" ${optLoading?"disabled":""}>${optLoading?"Optimizing...":"⚡ Optimize My Subscriptions"}</button>`:""}<button class="clear-btn" onclick="clearWL()">Clear All</button></div></div>`;
  watchlist.forEach((item,i)=>{
    const primary=svc(item.availableOn?.[0]?.service);
    h+=`<div class="card" style="display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:10px 14px">
      <div class="poster" style="width:34px;height:48px;border-radius:8px;background:linear-gradient(135deg,${primary?.color||"#666"},#1a1a2e);font-size:14px">${item.title?.[0]}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.title}</div>
        <div style="font-size:11px;color:#999">${item.year} · ${item.type}</div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0">`;
    item.availableOn?.slice(0,2).forEach(a=>{
      const sv=svc(a.service);
      h+=`<span class="svc-badge ${a.included?"included":"rental"}">${sv?`<span class="dot" style="background:${sv.color}"></span>`:""}${a.service}</span>`;
    });
    if(item.availableOn?.length>2)h+=`<span style="font-size:11px;color:#999;align-self:center">+${item.availableOn.length-2}</span>`;
    h+=`</div><button onclick="removeWL(${i})" style="width:26px;height:26px;border-radius:8px;border:1px solid var(--pill-border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#ccc;flex-shrink:0">×</button></div>`;
  });

  if(optLoading)h+=`<div class="loader-wrap" style="margin-top:16px"><div class="loader"></div><p>Crunching your best subscription plan...</p></div>`;
  else if(optError)h+=`<div class="empty" style="margin-top:16px"><div class="icon">😕</div>Couldn't generate a plan.<br><button class="retry-btn" onclick="runOptimizer()">Try Again</button></div>`;
  else if(optData){
    h+=`<div class="opt-card" style="margin-top:20px"><div class="opt-title">⚡ Your Optimized Subscription Plan</div><p class="opt-sub">The smartest way to watch everything on your list:</p>`;
    optData.plan?.forEach((step,i)=>{
      const sv=svc(step.service);
      h+=`<div class="opt-step"><div class="opt-num">${i+1}</div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:5px">${sv?svcIcon(sv,18):""} ${step.service}</div><div style="font-size:11.5px;color:var(--muted);margin-top:1px">Watch: ${step.watch?.join(", ")}</div></div><div style="font-size:14px;font-weight:700;color:var(--teal);flex-shrink:0">${step.cost}</div></div>`;
    });
    h+=`<div class="opt-stats">
      <div class="opt-stat" style="background:#fff;border:1px solid var(--border)"><div class="opt-stat-label">Total Cost</div><div class="opt-stat-val" style="color:var(--ink)">${optData.totalCost}</div></div>
      <div class="opt-stat" style="background:#fff;border:1px solid var(--border)"><div class="opt-stat-label">All at Once</div><div class="opt-stat-val" style="color:var(--red)">${optData.vsAllAtOnce}</div></div>
      <div class="opt-stat" style="background:var(--green-light);border:1px solid var(--green-border)"><div class="opt-stat-label" style="color:#065f46">You Save</div><div class="opt-stat-val" style="color:var(--green)">${optData.savings}</div></div>
    </div></div>`;
  }
  el.innerHTML=h;
}

function removeWL(i){watchlist.splice(i,1);if(watchlist.length<2)optData=null;renderWatchlist();renderTabs();}
function clearWL(){watchlist=[];optData=null;optError=false;renderWatchlist();renderTabs();}

async function runOptimizer(){
  optLoading=true;optError=false;optData=null;renderWatchlist();
  const titleList=watchlist.map(t=>`"${t.title}" (${t.availableOn?.map(a=>a.service).join(", ")})`).join("; ");
  const prompt=`I have a watchlist: ${titleList}
Create a month-by-month subscription plan to watch ALL titles spending as little as possible (one service at a time).
Return ONLY JSON (no markdown, no backticks):
{"plan":[{"month":"Month 1","service":"Netflix","cost":"$15.49","watch":["Title 1","Title 2"]}],"totalCost":"$XX.XX","vsAllAtOnce":"$XX.XX/mo","savings":"$XX.XX"}`;
  const data=parseJSON(await aiQuery(prompt));
  optLoading=false;
  if(data)optData=data;else optError=true;
  renderWatchlist();
}

// INIT
renderTabs();renderCompare();
</script>
</body>
</html>
